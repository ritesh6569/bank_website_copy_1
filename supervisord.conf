[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
user=root

[program:mysql]
command=/usr/bin/mysqld --user=mysql --socket=/var/run/mysqld/mysqld.sock --skip-networking
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=1

[program:apache]
command=/bin/bash -c "until mysqladmin ping --socket=/var/run/mysqld/mysqld.sock --silent 2>/dev/null; do sleep 1; done && source /etc/apache2/envvars && /usr/sbin/apache2 -D FOREGROUND"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=2
