services:
  - type: web
    name: miraji-bank-website
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: SITE_URL
        value: https://bank-website-copy-1.onrender.com/

      # MySQL runs inside the same container — connect via localhost (uses Unix socket)
      - key: DB_HOST
        value: "localhost"
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: "bank_db_copy_1"
      - key: DB_USER
        value: "bankuser"
      - key: DB_PASS
        value: "bankpass"
      - key: DB_SSL
        value: "false"

      - key: MAIL_PASS
        sync: false       # Gmail App Password — set in dashboard
