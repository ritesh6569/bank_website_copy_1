databases:
  - name: miraji-bank-db
    plan: free            # Render managed MySQL (free tier)
    databaseName: bank_db
    user: bankuser

services:
  - type: web
    name: miraji-bank-website
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free            # change to 'starter' for production
    healthCheckPath: /
    envVars:
      - key: SITE_URL
        value: https://miraji-bank-website.onrender.com/   # update after first deploy

      # Auto-populated from the managed MySQL database above
      - key: DB_HOST
        fromDatabase:
          name: miraji-bank-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: miraji-bank-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: miraji-bank-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: miraji-bank-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: miraji-bank-db
          property: database
      - key: DB_SSL
        value: "false"    # Render internal MySQL does not require SSL

      - key: MAIL_PASS
        sync: false       # Gmail App Password — set in dashboard
