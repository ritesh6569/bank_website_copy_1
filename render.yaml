services:
  - type: web
    name: miraji-bank-website
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: SITE_URL
        value: https://miraji-bank-website.onrender.com/

      # MySQL runs inside the same container — connect via localhost
      - key: DB_HOST
        value: "127.0.0.1"
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: "bank_db"
      - key: DB_USER
        value: "bankuser"
      - key: DB_PASS
        value: "bankpass"
      - key: DB_SSL
        value: "false"

      - key: MAIL_PASS
        sync: false       # Gmail App Password — set in dashboard
